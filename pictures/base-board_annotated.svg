<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Teufel Cinebar One (2020) — baseboard component map.
  Annotation overlay on top of base-board_IMG_4189.jpg.

  Coordinate system matches the source image's full resolution (5152×3864).
  All position values are approximate — feel free to nudge.

  Color coding:
    yellow   = external connectors / ports
    red      = power section (original — PMIC area, includes the burnt
               regulator)
    green    = power section (bodged replacement SMPS module)
    blue     = STM32 MCU + audio-related ICs
    magenta  = debug / programming
    cyan     = mounting + daughter-board interface
-->

